<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅行地点看板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #e2e8f0;
      --text-primary: #1a202c;
      --text-secondary: #718096;
      --text-muted: #a0aec0;
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --accent-hover: #4338ca;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 32px rgba(79,70,229,0.15);
      --radius: 16px;
      --transition: 0.25s ease;
    }

    body.dark {
      --bg: #0d0d1a;
      --surface: #161625;
      --surface2: #1e1e32;
      --border: #2a2a45;
      --text-primary: #e8eaf6;
      --text-secondary: #9198b5;
      --text-muted: #4a4a70;
      --accent: #6366f1;
      --accent-light: #1e1e40;
      --accent-hover: #818cf8;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-hover: 0 8px 32px rgba(99,102,241,0.25);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      transition: background var(--transition), border-color var(--transition);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      font-size: 28px;
      line-height: 1;
    }

    .brand-text h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .brand-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #countBadge {
      font-size: 13px;
      color: var(--text-muted);
    }

    #countBadge strong {
      color: var(--accent);
    }

    .btn-dark {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      background: var(--surface2);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-dark:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    /* ── Search bar ── */
    .toolbar {
      max-width: 1200px;
      margin: 32px auto 0;
      padding: 0 24px;
    }

    .search-wrap {
      position: relative;
      max-width: 400px;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    #searchInput {
      width: 100%;
      padding: 11px 16px 11px 42px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all var(--transition);
    }

    #searchInput::placeholder { color: var(--text-muted); }
    #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

    /* ── Grid ── */
    .grid {
      max-width: 1200px;
      margin: 28px auto 60px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition), background var(--transition);
      cursor: default;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: fadeUp 0.35s ease both;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-number {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .card-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      line-height: 1.3;
      flex: 1;
    }

    .card-address {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .card-address svg { flex-shrink: 0; margin-top: 2px; }

    .card-divider {
      height: 1px;
      background: var(--border);
    }

    .card-comment {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      flex: 1;
    }

    .card-comment-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    /* ── States ── */
    .state {
      max-width: 1200px;
      margin: 80px auto;
      padding: 0 24px;
      text-align: center;
    }

    .state-icon { font-size: 52px; margin-bottom: 16px; }

    .state h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .state p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .toolbar { margin-top: 20px; padding: 0 16px; }
      .grid { padding: 0 16px; gap: 16px; margin-top: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">✈️</div>
    <div class="brand-text">
      <h1>旅行地点看板</h1>
      <p>Travel Destination Board</p>
    </div>
  </div>
  <div class="header-right">
    <span id="countBadge"></span>
    <button class="btn-dark" id="darkBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      深色模式
    </button>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="搜索地点、地址或备注…" />
  </div>
</div>

<div id="main"></div>

<footer>
  数据来源：<a href="https://docs.google.com/spreadsheets/d/13G_un_CFKUWDKYcm-xqkNQFKjq4zOuT_EElGb_1RhJg" target="_blank">Google Sheets</a> &nbsp;·&nbsp; 自动拉取，每次刷新更新
</footer>

<script>
  const SHEET_ID = "13G_un_CFKUWDKYcm-xqkNQFKjq4zOuT_EElGb_1RhJg";

  let allPlaces = [];

  // ── Dark mode ──
  const darkBtn  = document.getElementById("darkBtn");
  const DARK_KEY = "travel-board-dark";

  function applyDark(on) {
    document.body.classList.toggle("dark", on);
    darkBtn.innerHTML = on
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> 浅色模式`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg> 深色模式`;
    localStorage.setItem(DARK_KEY, on ? "1" : "0");
  }

  darkBtn.addEventListener("click", () => applyDark(!document.body.classList.contains("dark")));

  const saved = localStorage.getItem(DARK_KEY);
  if (saved !== null) {
    applyDark(saved === "1");
  } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
    applyDark(true);
  }

  // ── Render ──
  function renderCards(places) {
    const main = document.getElementById("main");
    const badge = document.getElementById("countBadge");

    if (places.length === 0) {
      badge.innerHTML = "";
      main.innerHTML = `
        <div class="state">
          <div class="state-icon">🗺️</div>
          <h2>没有找到匹配的地点</h2>
          <p>请尝试其他关键词</p>
        </div>`;
      return;
    }

    badge.innerHTML = `共 <strong>${places.length}</strong> 个地点`;

    const grid = document.createElement("div");
    grid.className = "grid";

    places.forEach((p, i) => {
      const card = document.createElement("div");
      card.className = "card";
      card.style.animationDelay = `${Math.min(i * 0.05, 0.4)}s`;

      card.innerHTML = `
        <div class="card-header">
          <div class="card-number">${i + 1}</div>
          <div class="card-name">${esc(p.name)}</div>
        </div>
        ${p.address ? `
        <div class="card-address">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${esc(p.address)}
        </div>` : ""}
        ${p.comment ? `
        <div class="card-divider"></div>
        <div>
          <div class="card-comment-label">备注</div>
          <div class="card-comment">${esc(p.comment)}</div>
        </div>` : ""}
      `;
      grid.appendChild(card);
    });

    main.innerHTML = "";
    main.appendChild(grid);
  }

  function esc(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── Search ──
  document.getElementById("searchInput").addEventListener("input", e => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { renderCards(allPlaces); return; }
    const filtered = allPlaces.filter(p =>
      (p.name    || "").toLowerCase().includes(q) ||
      (p.address || "").toLowerCase().includes(q) ||
      (p.comment || "").toLowerCase().includes(q)
    );
    renderCards(filtered);
  });

  // ── States ──
  function showLoading() {
    document.getElementById("main").innerHTML = `
      <div class="state">
        <div class="spinner"></div>
        <h2>正在加载数据…</h2>
        <p>从 Google Sheets 拉取最新地点信息</p>
      </div>`;
    document.getElementById("countBadge").innerHTML = "";
  }

  function showError(msg) {
    document.getElementById("main").innerHTML = `
      <div class="state">
        <div class="state-icon">⚠️</div>
        <h2>加载失败</h2>
        <p>${msg}</p>
      </div>`;
  }

  // ── JSONP fetch（绕开 file:// CORS 限制）──
  // Google gviz 端点支持 responseHandler 回调，无需 fetch
  window._sheetCallback = function(data) {
    try {
      const rows = data.table.rows || [];
      if (rows.length < 2) throw new Error("表格中暂无数据");

      // 第一行作为列名（表格未被识别为 header 时的 fallback）
      const headerRow = rows[0].c || [];
      const cols = headerRow.map(cell => cell && cell.v != null ? String(cell.v).trim().toLowerCase() : "");

      allPlaces = rows.slice(1).map(row => {
        const obj = {};
        cols.forEach((col, i) => {
          if (!col) return;
          obj[col] = (row.c && row.c[i] && row.c[i].v != null) ? String(row.c[i].v).trim() : "";
        });
        return obj;
      }).filter(r => r.name);

      if (allPlaces.length === 0) throw new Error("表格中暂无数据");
      renderCards(allPlaces);
    } catch(e) {
      showError(e.message);
    }
  };

  function fetchData() {
    showLoading();

    // 超时保护：5 秒内没响应则报错
    const timer = setTimeout(() => showError("请求超时，请检查网络或表格是否公开"), 5000);

    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:_sheetCallback;out:json`;
    const script = document.createElement("script");
    script.src = url;
    script.onerror = () => {
      clearTimeout(timer);
      showError("无法加载数据，请确认表格已设为「知道链接的人均可查看」");
    };
    script.onload = () => clearTimeout(timer);
    document.head.appendChild(script);
  }

  fetchData();
</script>
</body>
</html>
