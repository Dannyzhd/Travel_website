<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅行地点看板</title>

  <!-- 样式：variables 必须第一个加载，其他文件依赖其中的 CSS 变量 -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/states.css" />

  <!-- 暗色模式：普通 script 同步执行，防止首屏主题闪烁 -->
  <script src="js/theme.js"></script>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">✈️</div>
    <div class="brand-text">
      <h1>旅行地点看板</h1>
      <p>Travel Destination Board</p>
    </div>
  </div>
  <div class="header-right">
    <span id="countBadge"></span>
    <button class="btn-dark" id="darkBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      深色模式
    </button>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="搜索地点、地址或备注…" />
  </div>
</div>

<div id="main"></div>

<footer>
  数据来源：<a href="https://docs.google.com/spreadsheets/d/13G_un_CFKUWDKYcm-xqkNQFKjq4zOuT_EElGb_1RhJg" target="_blank">Google Sheets</a> &nbsp;·&nbsp; 自动拉取，每次刷新更新
</footer>

<!-- ES module 入口，浏览器原生支持，无需构建工具 -->
<script type="module" src="js/main.js"></script>

</body>
</html>
